<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="820" height="260" fill="#ffffff"/>

  <!-- VM box -->
  <rect x="30" y="50" width="220" height="160" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="30" y="50" width="220" height="32" rx="6" fill="#eaeef2" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="30" y="70" width="220" height="12" fill="#eaeef2"/>
  <text x="140" y="72" text-anchor="middle" fill="#57606a" font-size="11" font-weight="bold" letter-spacing="1">VM</text>
  <text x="140" y="108" text-anchor="middle" fill="#24292f" font-size="14" font-weight="bold">MCP Client</text>
  <text x="140" y="135" text-anchor="middle" fill="#57606a" font-size="12">.mcp.json</text>
  <text x="140" y="158" text-anchor="middle" fill="#57606a" font-size="11">url: http://</text>
  <text x="140" y="175" text-anchor="middle" fill="#bc4c00" font-size="12">&lt;HOST_IP&gt;:8000/mcp</text>
  <text x="140" y="198" text-anchor="middle" fill="#57606a" font-size="11">IP: &lt;VM_IP&gt;</text>

  <!-- Arrow -->
  <line x1="252" y1="130" x2="368" y2="130" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="120" text-anchor="middle" fill="#1a7f37" font-size="11">HTTP</text>
  <text x="310" y="148" text-anchor="middle" fill="#57606a" font-size="10">port 8000</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- HOST box -->
  <rect x="370" y="50" width="420" height="160" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="370" y="50" width="420" height="32" rx="6" fill="#eaeef2" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="370" y="70" width="420" height="12" fill="#eaeef2"/>
  <text x="580" y="72" text-anchor="middle" fill="#57606a" font-size="11" font-weight="bold" letter-spacing="1">HOST</text>

  <!-- portproxy sub-box -->
  <rect x="388" y="92" width="180" height="104" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="478" y="112" text-anchor="middle" fill="#57606a" font-size="10" font-weight="bold">netsh portproxy</text>
  <text x="478" y="133" text-anchor="middle" fill="#bc4c00" font-size="11">&lt;HOST_IP&gt;:8000</text>
  <text x="478" y="153" text-anchor="middle" fill="#57606a" font-size="10">forwards to</text>
  <text x="478" y="173" text-anchor="middle" fill="#57606a" font-size="11">127.0.0.1:8000</text>
  <text x="478" y="190" text-anchor="middle" fill="#57606a" font-size="10">(loopback)</text>

  <!-- internal arrow -->
  <line x1="572" y1="144" x2="596" y2="144" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- unreal-mcp sub-box -->
  <rect x="600" y="92" width="176" height="104" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="688" y="112" text-anchor="middle" fill="#57606a" font-size="10" font-weight="bold">unreal-mcp plugin</text>
  <text x="688" y="138" text-anchor="middle" fill="#24292f" font-size="13" font-weight="bold">Unreal Editor</text>
  <text x="688" y="160" text-anchor="middle" fill="#57606a" font-size="11">bound to</text>
  <text x="688" y="178" text-anchor="middle" fill="#0969da" font-size="11">127.0.0.1:8000</text>

  <!-- Caption -->
  <text x="410" y="240" text-anchor="middle" fill="#57606a" font-size="11">VM is isolated. The agent acts only through the MCP interface.</text>

</svg>
